<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kanban Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="login-page">
    <div class="login-card">
      <h1>Kanban Todo</h1>
      <p class="login-subtitle">Faça login para continuar</p>
      <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="login-password" placeholder="Senha" autocomplete="current-password" />
      <button id="login-btn">Entrar</button>
      <p id="login-error" class="login-error hidden"></p>
    </div>
  </div>
  <div id="admin-page" class="hidden">
    <div class="container">
      <div class="top-bar">
        <h1>Kanban Todo</h1>
        <button id="logout-btn">Sair</button>
      </div>
      <div class="input-group">
        <div class="input-fields">
          <input type="text" id="todo-input" placeholder="Add a new todo..." />
          <textarea id="todo-description" placeholder="Add a description (optional)..." rows="2"></textarea>
        </div>
        <div class="input-buttons">
          <button id="add-btn">Add</button>
          <button id="export-btn">Export CSV</button>
          <button id="import-btn">Import CSV</button>
        </div>
      </div>
      <div class="kanban-board">
        <div class="column" data-status="todo">
          <h2>To Do</h2>
          <div class="column-body" id="column-todo"></div>
        </div>
        <div class="column" data-status="in_progress">
          <h2>In Progress</h2>
          <div class="column-body" id="column-in_progress"></div>
        </div>
        <div class="column" data-status="done">
          <h2>Done</h2>
          <div class="column-body" id="column-done"></div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
