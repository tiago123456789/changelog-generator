name: PR File Change Automation

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: write

jobs:
  comment-on-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Post CodeRabbit Command
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODERABBIT_TRIGGER_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '@coderabbitai run changelog'
            })
